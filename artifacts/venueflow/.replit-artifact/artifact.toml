kind = "web"
previewPath = "/"
title = "VenueFlow"
version = "1.0.0"
id = "artifacts/venueflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25210

[services.development]
run = "pnpm --filter @workspace/venueflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/venueflow", "run", "build" ]
publicDir = "artifacts/venueflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25210"
BASE_PATH = "/"
